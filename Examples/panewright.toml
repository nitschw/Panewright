# Panewright example configuration.
# i3 mental model, TOML syntax. Every key is optional — omitted keys use
# i3-familiar defaults (workspaces 1-9, vim-style focus/move on hjkl).

modifier = "ctrl-cmd"  # default; or "hyper" (Caps Lock via Karabiner) / "alt" / "ctrl" / "leader"

# Apps that float instead of tiling (bundle IDs).
floating-apps = [
  "com.apple.systempreferences",
  "com.apple.calculator",
]

[gaps]
inner = 8
outer = 8

[border]
width = 4
active-color = "#0A84FF"

[bar]
enabled = true
theme = "native"  # or "technical" for the monospace/square Linux look

[[binding]]
key = "1"
action = "workspace 1"

[[binding]]
key = "shift-1"
action = "move to workspace 1"

[[binding]]
key = "h"
action = "focus left"

[[binding]]
key = "shift-h"
action = "move left"

[[binding]]
key = "f"
action = "fullscreen"

[[binding]]
key = "shift-space"
action = "floating toggle"

[[binding]]
key = "r"
action = "mode resize"

[[binding]]
key = "enter"
action = "exec open -a iTerm"

[[binding]]
key = "right"
action = "focus monitor right"

[[binding]]
key = "shift-right"
action = "move to monitor right"

# Pin workspaces to monitors: 'main', 'secondary', a 1-based index,
# or a display-name regex.
[workspace-monitors]
1 = "main"
9 = "secondary"
